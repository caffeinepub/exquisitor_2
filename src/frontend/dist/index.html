  <body>
    <div id="root"></div>

    <!-- Register custom Cache-First Service Worker.
         Placed at end of body so it never blocks the critical render path.
         The SW intercepts static asset requests and serves them from the
         browser cache on repeat visits, eliminating the ICP boundary node
         re-verification delay (~8 s stall on subsequent reloads). -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker
            .register('/sw.js', { scope: '/' })
            .catch(function (err) {
              // SW registration failure is non-fatal — app works without it
              console.warn('[SW] Registration failed:', err);
            });
        });
      }
    </script>
  </body>
